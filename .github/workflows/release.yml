name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
      - run: npm ci
      # Branch protection is unavailable on this plan for private repos, so the
      # release job itself is the gate: nothing publishes unless the full
      # contract battery passes on the exact commit being released.
      - name: Gates (manifest, props, tokens, css contract, tests, raw colors, token purity)
        run: |
          npm run verify
          npm run props
          npm run tokens
          npm run test:props
          npm run test:css-contract
          node scripts/check-pure-token-file.mjs
          node scripts/check-raw-colors.mjs
          npx vitest run
      - run: npm run build
      - name: Exports contract (packed tarball resolves all consumer specifiers)
        run: npm run check:exports
      - name: Create release PR or publish to GitHub Packages
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          version: npx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
