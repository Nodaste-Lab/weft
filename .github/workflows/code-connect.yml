name: Figma Code Connect

# Publishes the *.figma.tsx component mappings so Figma Dev Mode shows real
# weft code. Skips cleanly until the FIGMA_ACCESS_TOKEN secret exists.
on:
  push:
    branches: [main]
    paths: ['src/ui/**/*.figma.tsx', 'figma.config.json']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Check Figma credentials
        id: creds
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
        run: |
          if [ -z "$FIGMA_ACCESS_TOKEN" ]; then
            echo "::notice::FIGMA_ACCESS_TOKEN not configured — skipping Code Connect publish."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.creds.outputs.ready == 'true'
        run: npm ci
      - if: steps.creds.outputs.ready == 'true'
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
        run: npx @figma/code-connect publish
