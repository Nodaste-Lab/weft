name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # design-system-props.mjs diffs the snapshot against the PR base ref
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Manifest verify (uiPrimitives ↔ src/ui, semver, version integrity)
        run: npm run verify
      - name: Prop-contract snapshot gate
        run: npm run props
      - name: Prop-gate unit tests
        run: npm run test:props
      - name: Pure token file invariant (weft.css stays injection-safe)
        run: node scripts/check-pure-token-file.mjs
      - name: Token-value lockfile (values change only with a version bump)
        run: npm run tokens
      - name: CSS semantics + contrast contract
        run: npm run test:css-contract
      - name: Exports-map contract (resolve every consumer specifier from the packed tarball)
        run: npm run check:exports
      - name: Raw-color audit (tokens only outside css/)
        run: node scripts/check-raw-colors.mjs
      - name: Unit + a11y tests
        run: npx vitest run
      - name: Build (ESM bundle)
        run: npm run build
      - name: Pack smoke (tarball contains css/src/tooling/manifest)
        run: |
          npm pack --dry-run --json > /tmp/pack.json
          node -e "
            const files = require('/tmp/pack.json')[0].files.map(f => f.path);
            for (const need of ['css/weft.css','css/weft-components.css','tooling/raw-color-pattern.js','manifest.json','props-snapshot.json','src/ui/button.tsx','dist/index.js']) {
              if (!files.some(f => f === need)) { console.error('missing from tarball:', need); process.exit(1); }
            }
            console.log('tarball contents OK (' + files.length + ' files)');
          "

  visual-regression:
    runs-on: ubuntu-latest
    # Pinned Playwright image so Chromium + fonts match the committed Linux
    # baselines (regenerate with scripts/update-visual-baselines.sh).
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:visual
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  react-19-smoke:
    # The peer range allows ^19 but the primitives were extracted on 18.3.1
    # (and react-day-picker's own peers cap at 18). This job proves the suite
    # under React 19 before any consumer imports the React entry on 19.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm install --no-save react@19 react-dom@19 @types/react@19 2>/dev/null || npm install --no-save --legacy-peer-deps react@19 react-dom@19
      - run: npx vitest run
