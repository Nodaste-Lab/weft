name: Deploy gallery site

# Publishes the public component gallery to Cloudflare (weft.heddle.us).
# Requires repo secrets CLOUDFLARE_API_TOKEN (Pages edit) + CLOUDFLARE_ACCOUNT_ID;
# skips cleanly (with a notice) until they exist.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Check Cloudflare credentials
        id: creds
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN not configured — skipping gallery deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.creds.outputs.ready == 'true'
        run: npm ci
      - if: steps.creds.outputs.ready == 'true'
        run: npm run site:build
      - if: steps.creds.outputs.ready == 'true'
        name: Deploy to Cloudflare Pages (weft.heddle.us)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy dist-site --project-name weft-gallery --branch main
